title: "ビットコインのオプションを「保険」として読む ― データで確かめる3つの問い"
summary: "ビットコインのオプションを「値動きの保険」にたとえ、Deribitの公開データ約5年ぶんを使って、初心者向けに3つの問いを検証する本。①その保険料は割高だったのか（予想変動率DVOL vs 実現ボラ）②市場の恐怖は暴落を予知できるのか③保険を売る側にまわると得なのか。オプションは相場を当てる道具ではなく、リスクに値段をつけてやりとりする市場だと分かる。数値・図・分析コードは再現可能。投資助言ではなく仕組みを理解するための一冊。"
